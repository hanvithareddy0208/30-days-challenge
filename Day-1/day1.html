<!DOCTYPE html>
<html>
<head>
    <title>Nested Switch Calculator</title>
</head>
<body>

    <h2>Operators Demo</h2>

    <input type="number" id="num1" placeholder="First Number">
    <input type="number" id="num2" placeholder="Second Number">

    <br><br>

    <label>Main Operator Type:</label>
    <select id="operator">
        <option value="arithmetic">Arithmetic</option>
        <option value="comparison">Comparison</option>
        <option value="logical">Logical</option>
        <option value="assignment">Assignment</option>
    </select>

    <br><br>

    <label>Sub Operator:</label>
    <input type="text" id="subOperator" placeholder="+, -, ==, &&, +=">

    <br><br>

    <button onclick="calculate()">Calculate</button>

    <h3 id="result">Result:</h3>

    <script>
        function calculate() {
            let num1 = Number(document.getElementById("num1").value);
            let num2 = Number(document.getElementById("num2").value);

            let operator = document.getElementById("operator").value;
            let subOperator = document.getElementById("subOperator").value;

            let result;

            switch (operator) {

                case "arithmetic":
                    switch (subOperator) {
                        case "+":
                            result = num1 + num2;
                            break;
                        case "-":
                            result = num1 - num2;
                            break;
                        case "*":
                            result = num1 * num2;
                            break;
                        case "/":
                            result = num1 / num2;
                            break;
                        case "%":
                            result = num1 % num2;
                            break;
                        default:
                            result = "Invalid Arithmetic Operator";
                    }
                    break;

                case "comparison":
                    switch (subOperator) {
                        case "==":
                            result = num1 == num2;
                            break;
                        case "===":
                            result = num1 === num2;
                            break;
                        case "!=":
                            result = num1 != num2;
                            break;
                        case ">":
                            result = num1 > num2;
                            break;
                        case "<":
                            result = num1 < num2;
                            break;
                        case ">=":
                            result = num1 >= num2;
                            break;
                        case "<=":
                            result = num1 <= num2;
                            break;
                        default:
                            result = "Invalid Comparison Operator";
                    }
                    break;

                case "logical":
                    switch (subOperator) {
                        case "&&":
                            result = (num1 > 0 && num2 > 0);
                            break;
                        case "||":
                            result = (num1 > 0 || num2 > 0);
                            break;
                        case "!":
                            result = !(num1 > 0);
                            break;
                        default:
                            result = "Invalid Logical Operator";
                    }
                    break;

                case "assignment":
                    switch (subOperator) {
                        case "=":
                            num1 = num2;
                            result = num1;
                            break;
                        case "+=":
                            num1 += num2;
                            result = num1;
                            break;
                        case "-=":
                            num1 -= num2;
                            result = num1;
                            break;
                        case "*=":
                            num1 *= num2;
                            result = num1;
                            break;
                        case "/=":
                            num1 /= num2;
                            result = num1;
                            break;
                        default:
                            result = "Invalid Assignment Operator";
                    }
                    break;

                default:
                    result = "Invalid Operator Type";
            }

            document.getElementById("result").innerText =
                "Result: " + result;
        }
    </script>
    <script src="Javascript-foundation.js"></script>

</body>
</html>
