<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Operators Demo</title>
</head>
<body>

    <h2>JavaScript Operators</h2>

    <input type="number" id="num1" placeholder="Enter First Number">
    <input type="number" id="num2" placeholder="Enter Second Number">

    <br><br>

    <button onclick="showResults()">Check Operators</button>

    <h3>Output:</h3>
    <pre id="result"></pre>

    <script>
        function showResults() {
            let a = Number(document.getElementById("num1").value);
            let b = Number(document.getElementById("num2").value);

            let output = "";

            // Arithmetic Operators
            output += "Arithmetic Operators\n";
            output += `a + b = ${a + b}\n`;
            output += `a - b = ${a - b}\n`;
            output += `a * b = ${a * b}\n`;
            output += `a / b = ${a / b}\n`;
            output += `a % b = ${a % b}\n\n`;

            // Comparison Operators
            output += "Comparison Operators\n";
            output += `a == b : ${a == b}\n`;
            output += `a === b : ${a === b}\n`;
            output += `a != b : ${a != b}\n`;
            output += `a !== b : ${a !== b}\n`;
            output += `a > b : ${a > b}\n`;
            output += `a < b : ${a < b}\n`;
            output += `a >= b : ${a >= b}\n`;
            output += `a <= b : ${a <= b}\n\n`;

            // Logical Operators
            output += "Logical Operators\n";
            output += `(a > 0 && b > 0) : ${a > 0 && b > 0}\n`;
            output += `(a > 0 || b > 0) : ${a > 0 || b > 0}\n`;
            output += `!(a > 0) : ${!(a > 0)}\n\n`;

            // Assignment Operators
            let x = a;

            output += "Assignment Operators\n";
            output += `x = a → ${x}\n`;

            x += b;
            output += `x += b → ${x}\n`;

            x = a;
            x -= b;
            output += `x -= b → ${x}\n`;

            x = a;
            x *= b;
            output += `x *= b → ${x}\n`;

            x = a;
            x /= b;
            output += `x /= b → ${x}\n`;

            x = a;
            x %= b;
            output += `x %= b → ${x}\n\n`;

            // Ternary Operator
            output += "Ternary Operator\n";
            output += `${a > b ? "a is greater" : "b is greater or equal"}\n`;

            document.getElementById("result").textContent = output;
        }
    </script>
    <script src="Javascript-foundation.js"></script>
</body>
</html>
